# ══════════════════════════════════════════════════════════════
#  SMOKE TESTS (Critical Path)
# ══════════════════════════════════════════════════════════════
test:smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  variables:
    ENV: "qa2"
  script:
    - npm run test:smoke
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  only:
    - main
    - develop
    - merge_requests

# ══════════════════════════════════════════════════════════════
#  ORIGINATION TESTS
# ══════════════════════════════════════════════════════════════
test:origination:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  variables:
    ENV: "qa2"
  script:
    - npm run test:origination
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  only:
    - main
    - develop
  allow_failure: true

