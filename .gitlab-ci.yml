  script:
    - npm run test:critical -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  when: manual
  allow_failure: true
