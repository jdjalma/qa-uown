# ══════════════════════════════════════════════════════════════
#  WORKFLOW RULES - Fail Fast & Smart Execution
# ══════════════════════════════════════════════════════════════
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - install
  - test

variables:
  # Node & Playwright
  NODE_VERSION: "20"
  PLAYWRIGHT_VERSION: "1.50.0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.playwright"
  
  # Performance & Retry Strategy
  PLAYWRIGHT_RETRIES: "2"
  PLAYWRIGHT_TIMEOUT: "60000"
  PLAYWRIGHT_WORKERS: "3"
  
  # Git Settings
  GIT_DEPTH: "10"
  GIT_STRATEGY: "fetch"
  
  # ═══════════════════════════════════════════════════════════════
  # REQUIRED: Configure these in GitLab CI/CD Settings → Variables
  # Settings → CI/CD → Variables (Protected + Masked recommended)
  # ═══════════════════════════════════════════════════════════════
  # EMAIL: Gmail address for OTP verification
  # EMAIL_PASSWORD: Gmail app password
  # UOWN_API_KEY: API key for UOWN services
  # UOWN_API_AUTHORIZATION: API authorization token
  # (Optional) UOWN_SVC_API_KEY, DB credentials, etc.

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - .playwright
    - node_modules

# ══════════════════════════════════════════════════════════════
#  INSTALL DEPENDENCIES
# ══════════════════════════════════════════════════════════════
install:
  stage: install
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  script:
    - echo "Installing dependencies"
    - echo "Node version $(node --version)"
    - echo "Playwright version $PLAYWRIGHT_VERSION"
    - npm ci --prefer-offline --no-audit
    - npx playwright install --with-deps chromium
    - echo "Dependencies installed successfully"
  artifacts:
    paths:
      - node_modules
      - .playwright
    expire_in: 1 day
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  API TESTS
# ══════════════════════════════════════════════════════════════
test:api:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 2
  before_script:
    - echo "Running API tests"
    - echo "Retries:$PLAYWRIGHT_RETRIES Timeout:$PLAYWRIGHT_TIMEOUT"
  script:
    - npm run test:api -- --retries=$PLAYWRIGHT_RETRIES
  when: manual
  after_script:
    - echo "Test execution completed"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  coverage: '/All tests\s+(\d+\.\d+)%/'
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  SMOKE TESTS (Critical Path) - MANUAL
# ══════════════════════════════════════════════════════════════
test:smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 3
  before_script:
    - echo "Running SMOKE tests (Critical Path)"
    - echo "Workers:$PLAYWRIGHT_WORKERS"
  script:
    - npm run test:smoke -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  when: manual
  after_script:
    - echo "Smoke test results:"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  coverage: '/All tests\s+(\d+\.\d+)%/'
  allow_failure: false
  retry:
    max: 1
    when:
      - runner_system_failure

