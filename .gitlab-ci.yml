stages:
  - install
  # - lint
  - test
  - report
  - deploy

variables:
  NODE_VERSION: "20"
  PLAYWRIGHT_VERSION: "1.50.0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.playwright"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - .playwright
    - node_modules

# ══════════════════════════════════════════════════════════════
#  INSTALL DEPENDENCIES
# ══════════════════════════════════════════════════════════════
install:
  stage: install
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  script:
    - npm ci
    - npx playwright install --with-deps chromium
  artifacts:
    paths:
      - node_modules
      - .playwright
    expire_in: 1 day
  only:
    - main
    - develop
    - merge_requests

