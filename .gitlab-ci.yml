# ══════════════════════════════════════════════════════════════
#  WORKFLOW RULES - Fail Fast & Smart Execution
# ══════════════════════════════════════════════════════════════
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - install
  - test

variables:
  # Node & Playwright
  NODE_VERSION: "20"
  PLAYWRIGHT_VERSION: "1.50.0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.playwright"
  
  # Performance & Retry Strategy
  PLAYWRIGHT_RETRIES: "2"
  PLAYWRIGHT_TIMEOUT: "60000"
  PLAYWRIGHT_WORKERS: "3"
  
  # Git Settings
  GIT_DEPTH: "10"
  GIT_STRATEGY: "fetch"
  
  # ═══════════════════════════════════════════════════════════════
  # REQUIRED: Configure these in GitLab CI/CD Settings → Variables
  # Settings → CI/CD → Variables (Protected + Masked recommended)
  # ═══════════════════════════════════════════════════════════════
  # EMAIL: Gmail address for OTP verification
  # EMAIL_PASSWORD: Gmail app password
  # UOWN_API_KEY: API key for UOWN services
  # UOWN_API_AUTHORIZATION: API authorization token
  # (Optional) UOWN_SVC_API_KEY, DB credentials, etc.

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - .playwright
    - node_modules

# ══════════════════════════════════════════════════════════════
#  INSTALL DEPENDENCIES
# ══════════════════════════════════════════════════════════════
install:
  stage: install
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  script:
    - echo "Installing dependencies"
    - echo "Node version $(node --version)"
    - echo "Playwright version $PLAYWRIGHT_VERSION"
    - npm ci --prefer-offline --no-audit
    - npx playwright install --with-deps chromium
    - echo "Dependencies installed successfully"
  artifacts:
    paths:
      - node_modules
      - .playwright
    expire_in: 1 day
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  CI TESTS - Unified Flow & Critical Path
# ══════════════════════════════════════════════════════════════
test:ci:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 2
  script:
    - echo "Running CI tests from tests/ci/ folder"
    - npx playwright test --project=ci-tests --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - echo "CI test results:"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  retry:
    max: 1
    when:
      - runner_system_failure
  allow_failure: false

# ══════════════════════════════════════════════════════════════
#  MANUAL JOBS - On Demand
# ══════════════════════════════════════════════════════════════
test:e2e:manual:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 4
  before_script:
    - echo "Running MANUAL E2E tests"
  script:
    - npm run test:e2e -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  when: manual
  allow_failure: true

test:critical:manual:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 2
  before_script:
    - echo "Running MANUAL Critical tests"
  script:
    - npm run test:critical -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  when: manual
  allow_failure: true