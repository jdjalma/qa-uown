# ══════════════════════════════════════════════════════════════
#  WORKFLOW RULES - Fail Fast & Smart Execution
# ══════════════════════════════════════════════════════════════
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - install
  - lint
  - test
  - quality-gate
  - report
  - notify
  - deploy

variables:
  # Node & Playwright
  NODE_VERSION: "20"
  PLAYWRIGHT_VERSION: "1.50.0"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "$CI_PROJECT_DIR/.playwright"
  
  # Performance & Retry Strategy
  PLAYWRIGHT_RETRIES: "2"
  PLAYWRIGHT_TIMEOUT: "60000"
  PLAYWRIGHT_WORKERS: "3"
  
  # Environment Selection (Dynamic)
  TEST_ENV: "${CI_COMMIT_REF_NAME == 'main' ? 'qa2' : CI_COMMIT_REF_NAME == 'develop' ? 'dev1' : 'qa2'}"
  
  # Quality Gates
  MIN_PASS_RATE: "95"
  FLAKY_TEST_THRESHOLD: "3"
  
  # Artifact Optimization
  VIDEO_ON_FAILURE_ONLY: "true"
  SCREENSHOT_ON_FAILURE_ONLY: "true"
  
  # Git Settings
  GIT_DEPTH: "10"
  GIT_STRATEGY: "fetch"

cache:
  key:
    files:
      - package-lock.json
  paths:
    - .npm
    - .playwright
    - node_modules

# ══════════════════════════════════════════════════════════════
#  INSTALL DEPENDENCIES
# ══════════════════════════════════════════════════════════════
install:
  stage: install
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  before_script:
    - echo "📦 Installing dependencies for environment: $TEST_ENV"
    - echo "🔧 Node version: $(node --version)"
    - echo "🎭 Playwright version: $PLAYWRIGHT_VERSION"
  script:
    - npm ci --prefer-offline --no-audit
    - npx playwright install --with-deps chromium
  after_script:
    - echo "✅ Dependencies installed successfully"
    - du -sh node_modules .playwright
  artifacts:
    paths:
      - node_modules
      - .playwright
    expire_in: 1 day
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  LINT & TYPE CHECK
# ══════════════════════════════════════════════════════════════
lint:
  stage: lint
  image: node:${NODE_VERSION}
  dependencies:
    - install
  before_script:
    - echo "🔍 Running TypeScript type checking..."
  script:
    - npm run lint
  after_script:
    - echo "✅ Lint check completed"
  allow_failure: false
  retry:
    max: 1
    when:
      - runner_system_failure

# ══════════════════════════════════════════════════════════════
#  API TESTS
# ══════════════════════════════════════════════════════════════
test:api:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install", "lint"]
  parallel: 2
  variables:
    ENV: "$TEST_ENV"
  before_script:
    - echo "🚀 Running API tests on environment: $ENV"
    - echo "⚙️ Retries:$PLAYWRIGHT_RETRIES Timeout:$PLAYWRIGHT_TIMEOUT"
  script:
    - npm run test:api -- --retries=$PLAYWRIGHT_RETRIES
  after_script:
    - echo "📊 Test execution completed"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  coverage: '/All tests\s+(\d+\.\d+)%/'
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  SMOKE TESTS (Critical Path) - BLOCKING
# ══════════════════════════════════════════════════════════════
test:smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install", "lint"]
  parallel: 3
  variables:
    ENV: "$TEST_ENV"
  before_script:
    - echo "🔥 Running SMOKE tests (Critical Path)"
    - echo "🎯 Environment:$ENV Workers:$PLAYWRIGHT_WORKERS"
  script:
    - npm run test:smoke -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - echo "📈 Smoke test results:"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  coverage: '/All tests\s+(\d+\.\d+)%/'
  allow_failure: false
  retry:
    max: 1
    when:
      - runner_system_failure

# ══════════════════════════════════════════════════════════════
#  ORIGINATION TESTS
# ══════════════════════════════════════════════════════════════
test:origination:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install", "test:smoke"]
  parallel: 4
  variables:
    ENV: "$TEST_ENV"
  before_script:
    - echo "🏦 Running Origination Portal tests"
  script:
    - npm run test:origination -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  retry:
    max: 1
    when:
      - runner_system_failure
  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  SERVICING TESTS
# ══════════════════════════════════════════════════════════════
test:servicing:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
