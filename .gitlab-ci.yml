  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  QUALITY GATE - Test Pass Rate Validation
# ══════════════════════════════════════════════════════════════
quality-gate:pass-rate:
  stage: quality-gate
  image: node:${NODE_VERSION}
  dependencies:
    - test:smoke
  before_script:
    - echo "🎯 Validating Quality Gates"
    - echo "📊 Minimum Pass Rate Required: $MIN_PASS_RATE%"
  script:
    - |
      if [ -f reports/test-summary.json ]; then
        PASS_RATE=$(jq -r '.passRate // 0' reports/test-summary.json)
        echo "✅ Current Pass Rate: $PASS_RATE%"
        if (( $(echo "$PASS_RATE < $MIN_PASS_RATE" | bc -l) )); then
          echo "❌ QUALITY GATE FAILED: Pass rate $PASS_RATE% is below threshold $MIN_PASS_RATE%"
          exit 1
        else
          echo "✅ QUALITY GATE PASSED: Pass rate $PASS_RATE% meets threshold"
        fi
      else
        echo "⚠️ No test summary found, skipping quality gate"
      fi
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
  allow_failure: false

# ══════════════════════════════════════════════════════════════
#  GENERATE ALLURE REPORT
# ══════════════════════════════════════════════════════════════
report:allure:
  stage: report
  image: node:${NODE_VERSION}
  dependencies:
    - test:smoke
    - test:origination
    - test:servicing
    - test:website
  before_script:
    - echo "📊 Generating Allure Report"
    - apt-get update && apt-get install -y default-jre
    - npm install -g allure-commandline
  script:
    - allure generate reports/allure-results -o reports/allure-report --clean
    - echo "✅ Allure report generated successfully"
  after_script:
    - echo "📈 Report available at: $CI_PAGES_URL"
  artifacts:
    paths:
      - reports/allure-report
    expire_in: 30 days
  when: always

# ══════════════════════════════════════════════════════════════
#  SONARQUBE ANALYSIS
# ══════════════════════════════════════════════════════════════
sonarqube:
  stage: report
  image: sonarsource/sonar-scanner-cli:latest
  dependencies:
    - lint
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  before_script:
    - echo "🔍 Running SonarQube Analysis"
  script:
    - sonar-scanner
  after_script:
    - echo "✅ SonarQube analysis completed"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "develop"'
      when: always
  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  NOTIFICATIONS - Slack/Email on Failure
# ══════════════════════════════════════════════════════════════
notify:slack:
  stage: notify
  image: curlimages/curl:latest
  dependencies: []
  before_script:
    - echo "📧 Sending notification to Slack"
  script:
    - |
      if [ "$CI_JOB_STATUS" == "failed" ] || [ "$CI_PIPELINE_SOURCE" == "schedule" ]; then
        EMOJI="❌"
        COLOR="danger"
        if [ "$CI_JOB_STATUS" == "success" ]; then
          EMOJI="✅"
          COLOR="good"
        fi
        
        MESSAGE="$EMOJI Pipeline *$CI_PIPELINE_SOURCE* - Branch: *$CI_COMMIT_REF_NAME*\n"
        MESSAGE="${MESSAGE}Status: *$CI_JOB_STATUS*\n"
        MESSAGE="${MESSAGE}Commit: $CI_COMMIT_SHORT_SHA - $CI_COMMIT_TITLE\n"
        MESSAGE="${MESSAGE}Author: $CI_COMMIT_AUTHOR\n"
        MESSAGE="${MESSAGE}Pipeline: $CI_PIPELINE_URL"
        
        if [ -n "$SLACK_WEBHOOK_URL" ]; then
          curl -X POST "$SLACK_WEBHOOK_URL" \
            -H 'Content-Type: application/json' \
            -d '{"text":"'"$MESSAGE"'","color":"'"$COLOR"'"}'
          echo "✅ Slack notification sent"
        else
          echo "⚠️ SLACK_WEBHOOK_URL not configured"
        fi
      fi
  rules:
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: on_failure
  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  DEPLOY REPORTS TO GITLAB PAGES
# ══════════════════════════════════════════════════════════════
pages:
  stage: deploy
  image: alpine:latest
  dependencies:
    - report:allure
  before_script:
    - echo "🚀 Deploying reports to GitLab Pages"
  script:
    - mkdir -p public
    - cp -r reports/allure-report/* public/
    - echo "✅ Reports deployed successfully"
  after_script:
    - echo "📊 View reports at: $CI_PAGES_URL"
  artifacts:
    paths:
      - public
    expire_in: 30 days
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
  when: always

# ══════════════════════════════════════════════════════════════
#  MANUAL JOBS - On Demand
# ══════════════════════════════════════════════════════════════
test:e2e:manual:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 4
  variables:
    ENV: "qa2"
  before_script:
    - echo "🎯 Running MANUAL E2E tests"
  script:
    - npm run test:e2e -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  when: manual
  allow_failure: true

test:critical:manual:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
