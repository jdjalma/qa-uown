# ══════════════════════════════════════════════════════════════
#  WORKFLOW RULES - Fail Fast & Smart Execution
# ══════════════════════════════════════════════════════════════
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "main"'
      when: always
    - if: '$CI_COMMIT_BRANCH == "dev"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "schedule"'
      when: always
    - if: '$CI_PIPELINE_SOURCE == "web"'
      when: always
    - when: never

stages:
  - install
  - test

variables:
  # Node & Playwright
  NODE_VERSION: "20"
  PLAYWRIGHT_VERSION: "1.58.2"
  npm_config_cache: "$CI_PROJECT_DIR/.npm"
  PLAYWRIGHT_BROWSERS_PATH: "/ms-playwright"

  # Performance & Retry Strategy
  PLAYWRIGHT_RETRIES: "0"
  PLAYWRIGHT_TIMEOUT: "60000"
  PLAYWRIGHT_WORKERS: "3"

  # Git Settings
  GIT_DEPTH: "10"
  GIT_STRATEGY: "fetch"

  # ═══════════════════════════════════════════════════════════════
  # Internal cluster URLs (dev-k8s-runner — no whitelist needed)
  # ═══════════════════════════════════════════════════════════════
  # SVC API internal URLs (dev-k8s-runner — bypasses WAF/IP whitelist)
  SANDBOX_SVC_API_URL: "http://uown-sandbox-svc.uown-sandbox.svc.cluster.local"
  QA1_SVC_API_URL: "http://uown-qa1-svc.uown-qa1.svc.cluster.local"
  QA2_SVC_API_URL: "http://uown-qa2-svc.uown-qa2.svc.cluster.local"
  # Portal internal URLs (all envs return 403 on public URLs from CI runner)
  SANDBOX_ORIGINATION_URL: "http://uown-sandbox-uown-origination.uown-sandbox.svc.cluster.local/"
  SANDBOX_SERVICING_URL: "http://uown-sandbox-svc-website.uown-sandbox.svc.cluster.local/"
  SANDBOX_WEBSITE_URL: "http://uown-sandbox-uown-website.uown-sandbox.svc.cluster.local/"
  QA1_ORIGINATION_URL: "http://uown-qa1-uown-origination.uown-qa1.svc.cluster.local/"
  QA1_SERVICING_URL: "http://uown-qa1-svc-website.uown-qa1.svc.cluster.local/"
  QA1_WEBSITE_URL: "http://uown-qa1-uown-website.uown-qa1.svc.cluster.local/"
  QA2_ORIGINATION_URL: "http://uown-qa2-uown-origination.uown-qa2.svc.cluster.local/"
  QA2_SERVICING_URL: "http://uown-qa2-svc-website.uown-qa2.svc.cluster.local/"
  QA2_WEBSITE_URL: "http://uown-qa2-uown-website.uown-qa2.svc.cluster.local/"

  # ═══════════════════════════════════════════════════════════════
  # REQUIRED: Configure these in GitLab CI/CD Settings → Variables
  # Settings → CI/CD → Variables (Protected + Masked recommended)
  # ═══════════════════════════════════════════════════════════════
  # EMAIL: Gmail address for OTP verification
  # EMAIL_PASSWORD: Gmail app password
  # UOWN_API_KEY: API key for UOWN services
  # UOWN_API_AUTHORIZATION: API authorization token
  # (Optional) UOWN_SVC_API_KEY, DB credentials, etc.

# ══════════════════════════════════════════════════════════════
#  INSTALL DEPENDENCIES
# ══════════════════════════════════════════════════════════════
install:
  stage: install
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  before_script:
    - echo "════════════════════════════════════════════════════════"
    - echo "  INSTALL STAGE - Dependencies & Playwright"
    - echo "════════════════════════════════════════════════════════"
    - echo "Node version $(node --version)"
    - echo "NPM version $(npm --version)"
    - echo "Playwright version $PLAYWRIGHT_VERSION"
    - echo "Cache directory $npm_config_cache"
    - echo "Playwright browsers path $PLAYWRIGHT_BROWSERS_PATH"
  script:
    - |
      echo "→ Installing npm dependencies..."
      npm ci --prefer-offline --no-audit --loglevel=error
    - |
      echo "→ Verifying installation..."
      npx playwright --version
      ls -lh node_modules/.bin/playwright || true
  after_script:
    - echo "════════════════════════════════════════════════════════"
    - echo "  INSTALLATION SUMMARY"
    - echo "════════════════════════════════════════════════════════"
    - du -sh node_modules 2>/dev/null || echo "node_modules not found"
    - du -sh .npm 2>/dev/null || echo ".npm cache not found"
    - echo "Browsers path (pre-installed in image):" && ls /ms-playwright 2>/dev/null || true
  artifacts:
    paths:
      - node_modules/
    expire_in: 1 day
    when: on_success
  cache:
    key: 
      files:
        - package-lock.json
      prefix: ${CI_COMMIT_REF_SLUG}
    paths:
      - .npm/
    policy: pull-push
  retry:
    max: 2
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  API TESTS
# ══════════════════════════════════════════════════════════════
test:api:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 2
  before_script:
    - echo "Running API tests"
    - echo "Retries:$PLAYWRIGHT_RETRIES Timeout:$PLAYWRIGHT_TIMEOUT"
  script:
    - npm run test:api -- --retries=$PLAYWRIGHT_RETRIES
  when: manual
  after_script:
    - echo "Test execution completed"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  coverage: '/All tests\s+(\d+\.\d+)%/'
  retry:
    max: 1
    when:
      - runner_system_failure
      - stuck_or_timeout_failure

# ══════════════════════════════════════════════════════════════
#  SMOKE TESTS (Critical Path) - MANUAL
# ══════════════════════════════════════════════════════════════
test:smoke:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install"]
  parallel: 3
  before_script:
    - echo "Running SMOKE tests (Critical Path)"
    - echo "Workers:$PLAYWRIGHT_WORKERS"
  script:
    - npm run test:smoke -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  when: manual
  after_script:
    - echo "Smoke test results:"
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
    expire_in: 7 days
  coverage: '/All tests\s+(\d+\.\d+)%/'
  allow_failure: false
  retry:
    max: 1
    when:
      - runner_system_failure

