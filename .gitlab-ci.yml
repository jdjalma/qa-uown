# ══════════════════════════════════════════════════════════════
#  WEBSITE TESTS
# ══════════════════════════════════════════════════════════════
test:website:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  needs: ["install", "test:smoke"]
  parallel: 2
  variables:
    ENV: "$TEST_ENV"
  before_script:
    - echo "🌐 Running Website tests"
  script:
    - npm run test:website -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
      junit: reports/junit.xml
