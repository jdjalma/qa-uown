# ══════════════════════════════════════════════════════════════
#  REGRESSION TESTS (Full Suite - Scheduled)
#  Configure no GitLab: CI/CD > Schedules
#  Cron: 0 22 * * * (22h diariamente - America/Sao_Paulo)
# ══════════════════════════════════════════════════════════════
test:regression:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  variables:
    ENV: "qa2"
  script:
    - npm run test:regression
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    reports:
      junit: reports/junit.xml
    expire_in: 30 days
  only:
    - schedules
  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  CROSS-BROWSER TESTS (Firefox, WebKit)
# ══════════════════════════════════════════════════════════════
test:cross-browser:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  variables:
    ENV: "qa2"
  script:
    - npx playwright install firefox webkit
    - npm run test:cross-browser
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  only:
    - schedules
  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  GENERATE ALLURE REPORT
# ══════════════════════════════════════════════════════════════
report:allure:
  stage: report
  image: node:${NODE_VERSION}
  dependencies:
    - test:smoke
    - test:api
  before_script:
    - apt-get update && apt-get install -y default-jre
    - npm install -g allure-commandline
  script:
    - allure generate reports/allure-results -o reports/allure-report --clean
  artifacts:
    paths:
      - reports/allure-report
    expire_in: 30 days
  only:
    - main
    - develop
  when: always

# ══════════════════════════════════════════════════════════════
#  SONARQUBE ANALYSIS
# ══════════════════════════════════════════════════════════════
sonarqube:
  stage: report
  image: sonarsource/sonar-scanner-cli:latest
  dependencies:
    - lint
  variables:
    SONAR_USER_HOME: "${CI_PROJECT_DIR}/.sonar"
    GIT_DEPTH: "0"
  cache:
    key: "${CI_JOB_NAME}"
    paths:
      - .sonar/cache
  script:
    - sonar-scanner
  only:
    - main
    - develop
  allow_failure: true

# ══════════════════════════════════════════════════════════════
#  DEPLOY REPORTS TO GITLAB PAGES
# ══════════════════════════════════════════════════════════════
pages:
  stage: deploy
  image: alpine:latest
  dependencies:
    - report:allure
  script:
    - mkdir -p public
    - cp -r reports/allure-report/* public/
  artifacts:
    paths:
      - public
    expire_in: 30 days
  only:
    - main
  when: always

# ══════════════════════════════════════════════════════════════
#  MANUAL JOBS - On Demand
# ══════════════════════════════════════════════════════════════
test:e2e:manual:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  variables:
    ENV: "qa2"
  script:
    - npm run test:e2e
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  when: manual
  allow_failure: true

test:critical:manual:
  stage: test
  image: mcr.microsoft.com/playwright:v${PLAYWRIGHT_VERSION}-jammy
  dependencies:
    - install
  variables:
    ENV: "qa2"
  script:
    - npm run test:critical
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/
    expire_in: 7 days
  when: manual
  allow_failure: true
