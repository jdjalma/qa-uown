    - install
  needs: ["install", "test:smoke"]
  parallel: 3
  variables:
    ENV: "$TEST_ENV"
  before_script:
    - echo "⚙️ Running Servicing Portal tests"
  script:
    - npm run test:servicing -- --retries=$PLAYWRIGHT_RETRIES --workers=$PLAYWRIGHT_WORKERS
  after_script:
    - if [ -f reports/test-summary.json ]; then cat reports/test-summary.json; fi
  artifacts:
    when: always
    paths:
      - reports/
      - playwright-report/
      - test-results/**/*.json
      - test-results/**/*.png
    reports:
