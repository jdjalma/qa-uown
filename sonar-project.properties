# Project identification
sonar.projectKey=fintech-playwright
sonar.projectName=Fintech Playwright
sonar.projectVersion=1.0

# Source configuration
sonar.sources=src
sonar.tests=tests
sonar.sourceEncoding=UTF-8

# TypeScript
sonar.typescript.lcov.reportPaths=reports/coverage/lcov.info

# Exclusions — what NOT to analyze
sonar.exclusions=\
  node_modules/**,\
  dist/**,\
  reports/**,\
  docker/**,\
  **/*.config.ts,\
  src/support/custom-reporter.ts

# Test exclusions — don't count test files as source
sonar.test.inclusions=tests/**/*.ts

# Duplication exclusions
sonar.cpd.exclusions=\
  src/data/**,\
  src/selectors/**

# Coverage exclusions — files where coverage doesn't apply
sonar.coverage.exclusions=\
  tests/**,\
  src/data/**,\
  src/selectors/**,\
  src/types/**

# SCM
sonar.scm.provider=git

# SonarQube server
sonar.host.url=http://localhost:9000
sonar.login=${SONAR_TOKEN}
